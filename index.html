<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyNetWord Streaming Premium</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0a0f1c;
color:white;
overflow-x:hidden;
}

/* HERO NEON */
.hero{
text-align:center;
padding:80px 20px;
background:radial-gradient(circle at top,#1a1f3c,#0a0f1c);
}

.hero h1{
font-size:3.5rem;
color:#fff;
text-shadow:
0 0 5px #6c63ff,
0 0 10px #6c63ff,
0 0 20px #7209b7,
0 0 40px #7209b7;
animation:neonPulse 2s infinite alternate;
}

@keyframes neonPulse{
from{
text-shadow:
0 0 5px #6c63ff,
0 0 15px #7209b7,
0 0 25px #7209b7;
}
to{
text-shadow:
0 0 20px #4cc9f0,
0 0 30px #7209b7,
0 0 60px #7209b7;
}
}

/* PRODUCTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(108,99,255,0.3);
transition:.3s;
border:1px solid rgba(108,99,255,0.3);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #6c63ff;
}

.card img{
width:100%;
height:80px;
object-fit:contain;
}

.price{
color:#38b000;
font-size:18px;
}

.stock{
font-size:13px;
color:#4CAF50;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#6c63ff;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 15px #6c63ff;
}

/* CARRITO */
.cart{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#0f172a;
padding:20px;
transition:.3s;
overflow:auto;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}

.cart.active{right:0;}

.cart-toggle{
position:fixed;
top:20px;
right:20px;
background:#6c63ff;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 15px #6c63ff;
}

/* ADMIN */
.admin-panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000ee;
display:none;
overflow:auto;
padding:40px;
}

.admin-box{
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px #6c63ff;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

</style>
</head>
<body>

<section class="hero">
<h1>SkyNetWord Premium</h1>
<p>Streaming • Apps • IA • Gaming</p>
</section>

<div class="products" id="products"></div>

<div class="cart" id="cart">
<h2>Carrito</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>

<input type="text" id="buyerName" placeholder="Tu nombre">
<input type="email" id="buyerEmail" placeholder="Tu correo">
<button onclick="confirmPayment()">Enviar Comprobante</button>
</div>

<div class="cart-toggle" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
</div>

<div class="admin-panel" id="adminPanel">
<div class="admin-box">
<h2>Panel Admin</h2>
<div id="adminProducts"></div>
<button onclick="closeAdmin()">Cerrar</button>
</div>
</div>

<script>

emailjs.init("YOUR_PUBLIC_KEY");

let products = JSON.parse(localStorage.getItem("products")) || [
{ name:"Netflix Completa", price:225, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"},
{ name:"Disney+ Completa", price:45, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg"},
{ name:"Spotify Premium", price:80, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg"}
];

let cart=[];

function saveProducts(){
localStorage.setItem("products",JSON.stringify(products));
}

function render(){
const container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.logo}">
<h3>${p.name}</h3>
<div class="stock">Stock: ${p.stock}</div>
<div class="price">$${p.price}</div>
<button onclick="addToCart(${i})">Comprar</button>
</div>`;
});
}
render();

function addToCart(i){
if(products[i].stock<=0){alert("Agotado");return;}
cart.push(products[i]);
products[i].stock--;
saveProducts();
updateCart();
render();
toggleCart();
}

function updateCart(){
let total=0,items="";
cart.forEach(p=>{
total+=p.price;
items+=`<p>${p.name} - $${p.price}</p>`;
});
document.getElementById("cartItems").innerHTML=items;
document.getElementById("total").innerText=total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function confirmPayment(){
const name=document.getElementById("buyerName").value;
const email=document.getElementById("buyerEmail").value;

if(!name || !email){alert("Completa tus datos");return;}

let order="",total=0;
cart.forEach(p=>{
order+=p.name+" - $"+p.price+"\n";
total+=p.price;
});

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
buyer:name,
buyer_email:email,
order:order,
total:total
}).then(()=>{
alert("Comprobante enviado correctamente");
cart=[];
updateCart();
});
}

/* ADMIN ACCESO OCULTO */
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key==="A"){
let pass=prompt("Contraseña:");
if(pass==="admin2026"){
openAdmin();
}
}
});

function openAdmin(){
document.getElementById("adminPanel").style.display="block";
renderAdmin();
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`
<h4>${p.name}</h4>
Precio:<input type="number" value="${p.price}" onchange="updatePrice(${i},this.value)">
Stock:<input type="number" value="${p.stock}" onchange="updateStock(${i},this.value)">
<hr>`;
});
document.getElementById("adminProducts").innerHTML=html;
}

function updatePrice(i,v){products[i].price=parseInt(v);saveProducts();render();}
function updateStock(i,v){products[i].stock=parseInt(v);saveProducts();render();}

</script>

</body>
</html>
