<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Monitoring</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .container {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 60px);
    }
    .sidebar {
      background: #020617;
      padding: 20px;
    }
    .sidebar h3 {
      margin-bottom: 10px;
    }
    .unit {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }
    .map {
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body><header>
  Skynet Monitoring System
</header><div class="container">
  <div class="sidebar">
    <h3>Unidades</h3>
    <div class="unit">Camioneta 1</div>
    <div class="unit">Camioneta 2</div>
    <div class="unit">Camioneta 3</div>
    <div class="unit">Camioneta 4</div>
  </div>  <div class="map">
    <iframe 
      src="https://maps.google.com/maps?q=Poza%20Rica&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>
  </div>
</div></body>
</html>
