<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyNetWord Streaming Premium</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#0b0f1a;
color:white;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#1a1f3c,#3a0ca3,#7209b7);
padding:80px 20px;
text-align:left;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
}

.hero-text{
max-width:600px;
}

.hero h1{
font-size:3rem;
margin:0;
}

.hero h2{
font-size:2rem;
color:#4cc9f0;
}

.hero p{
opacity:0.9;
margin:20px 0;
}

.hero-buttons button{
padding:15px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-right:10px;
}

.btn-primary{background:#6c63ff;color:white;}
.btn-success{background:#38b000;color:white;}

/* CATALOGO */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#121826;
border-radius:15px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:90px;
object-fit:contain;
margin-bottom:15px;
}

.stock{
font-size:13px;
color:#4CAF50;
}

.price{
font-size:18px;
margin:10px 0;
color:#38b000;
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#6c63ff;
color:white;
cursor:pointer;
}

/* CARRITO */
.cart{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:1000;
}

.cart.active{right:0;}

.cart-toggle{
position:fixed;
top:20px;
right:20px;
background:#6c63ff;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:1100;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
}

</style>
</head>
<body>

<section class="hero">
<div class="hero-text">
<h1>SkyNetWord</h1>
<h2>Compra Directa Sin Intermediarios</h2>
<p>Cuentas premium, perfiles compartidos y apps digitales. Recibe en minutos.</p>
<div class="hero-buttons">
<button class="btn-primary" onclick="scrollToCatalog()">Ver Catálogo</button>
<button class="btn-success" onclick="toggleCart()">Pagar Ahora</button>
</div>
</div>
</section>

<div class="products" id="products"></div>

<div class="cart" id="cart">
<h2>Tu Carrito</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="checkout()">Finalizar Compra</button>
</div>

<div class="cart-toggle" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
</div>

<a href="https://wa.me/5217823981639" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

const products = [

{ name:"Netflix Completa", price:225, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"},
{ name:"Disney+ Completa", price:45, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg"},
{ name:"Apple TV Completa", price:40, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_TV_Plus_Logo.svg"},
{ name:"Plex Completa", price:32, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/7/75/Plex_logo.svg"},
{ name:"Mubi Completa", price:20, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/6/6e/MUBI_logo.svg"},
{ name:"IPTV Completa", price:72, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/IPTV_Logo.svg"},
{ name:"Office 365 Completa", price:175, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"},
{ name:"Canva Pro", price:17, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg"},
{ name:"Gemini Pro IA", price:35, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/8/8f/Google_Gemini_logo.svg"},
{ name:"ChatGPT 30 Días", price:25, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg"},
{ name:"Xbox Game Pass", price:110, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/4/43/Xbox_logo.svg"},
{ name:"Duolingo Pro", price:16, stock:10, logo:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Duolingo_logo.svg"}

];

let cart=[];

const container=document.getElementById("products");

function render(){
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.logo}">
<h3>${p.name}</h3>
<div class="stock">Stock disponible: ${p.stock}</div>
<div class="price">$${p.price}</div>
<button onclick="addToCart(${i})">Comprar</button>
</div>`;
});
}

function addToCart(index){
if(products[index].stock<=0){alert("Agotado");return;}
cart.push(products[index]);
products[index].stock--;
updateCart();
render();
toggleCart();
}

function updateCart(){
let total=0;
let items="";
cart.forEach(p=>{
total+=p.price;
items+=`<p>${p.name} - $${p.price}</p>`;
});
document.getElementById("cartItems").innerHTML=items;
document.getElementById("total").innerText=total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function checkout(){
let order="";
let total=0;
cart.forEach(p=>{
order+=p.name+" - $"+p.price+"\n";
total+=p.price;
});

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
order:order,
total:total
}).then(()=>{
alert("Pedido enviado correctamente");
cart=[];
updateCart();
});
}

function scrollToCatalog(){
window.scrollTo({top:600,behavior:"smooth"});
}

render();
</script>

</body>
  </html>
